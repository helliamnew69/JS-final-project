<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="main-container">
  <div class="content">
    <div class="heading-text">
      <h1 class="heading">Đăng nhập</h1>
      <p class="supporting-text">Đăng nhập tài khoản để sử dụng hệ thống quản lý</p>
    </div>

    <form class="form">
      <div class="form-fields">
        <div class="input-field">
          <label class="email-label" for="email">Email</label>
          <input class="text-input" type="email" id="email" name="email" />
        </div>

        <div class="input-field">
          <label class="password-label" for="password">Mật khẩu</label>
          <input class="text-input" type="password" id="password" name="password" />
        </div>

        <div class="checkbox">
          <input type="checkbox" id="agree" />
          <label class="agree-policy" for="agree">Bạn đồng ý với <span class="policy-terms">chính sách và điều khoản</span></label>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="button-base">Đăng nhập</button>
      </div>
    </form>
  </div>
</div>

</body>
</html>
