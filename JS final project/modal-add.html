<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm danh mục</title>
    <link rel="stylesheet" href="modal.css">
</head>
<body>

<div class="modal">
    <div class="modal-header">
        <h2>Thêm mới danh mục</h2>
        <span class="close">&times;</span>
    </div>

```
<div class="modal-body">

    <!-- Mã danh mục -->
    <label>Mã danh mục <span class="required">*</span></label>
    <input type="text">

    <!-- Tên danh mục -->
    <label>Tên danh mục <span class="required">*</span></label>
    <input type="text">

    <!-- Trạng thái -->
    <label>Trạng thái</label>
    <div class="radio-group">
        <label><input type="radio" name="status" checked> Đang hoạt động</label>
        <label><input type="radio" name="status"> Ngừng hoạt động</label>
    </div>

</div>

<div class="modal-footer">
    <button class="btn cancel">Hủy</button>
    <button class="btn submit">Thêm</button>
</div>


</div>

</body>
</html>
