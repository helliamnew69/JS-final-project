<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="style2.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <style>
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      min-width: 260px;
      max-width: 360px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: auto;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .toast-success {
      background: #2e7d32;
    }
    .toast-error {
      background: #c62828;
    }
  </style>
</head>
<body>
  <section class="MNHNhNgKMobile">
    <div class="Container">
      <div class="Content">
        <div class="HeadingAndSupportingText">
          <h1 class="Heading">Đăng nhập</h1>
          <p class="SupportingText">Đăng nhập tài khoản để sử dụng dịch vụ</p>
        </div>

        <form class="Form" action="#" method="post">
          <div class="FormFields">
            <div class="InputFieldBase">
              <label class="Label" for="email">Email</label>
              <input class="Input" type="email" id="email" name="email" placeholder="you@example.com" required />
              <p class="error-message" id="email-error"></p>
            </div>

            <div class="InputFieldBase">
              <label class="Label" for="password">Mật khẩu</label>
              <input class="Input" type="password" id="password" name="password" placeholder="********" required />
              <p class="error-message" id="password-error"></p>
            </div>

            <div class="Extra">
              <label class="Checkbox" for="agree">
                <input class="CheckboxBase" type="checkbox" id="agree" name="agree" />
                <span class="Text">Nhớ mật khẩu</span>
              </label>
              <label for="">
                <span class="Text"><a href="">Quên mật khẩu</a></span>
              </label>
            </div>  
          </div>

          <button type="submit" class="ButtonBase">Đăng nhập</button>
        </form>

        <p class="switch-link">Bạn chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
      </div>
    </div>
  </section>
  <div id="toast-container" class="toast-container"></div>
  <script src="login.js"></script>
</body>
</html>
